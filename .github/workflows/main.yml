name: Start DDNet Server
on: workflow_dispatch

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install DDNet
        run: |
          sudo apt update
          D_LINK=$(echo "aHR0cHM6Ly9ydS5kZG5ldC5vcmcvZG93bmxvYWRzL0RETmV0LTE5LjgtbGludXhfeDg2XzY0LnRhci54eg==" | base64 -d)
          curl -L "$D_LINK" -o ddnet.tar.xz
          mkdir ddnet_temp
          tar -xvf ddnet.tar.xz -C ddnet_temp --strip-components=1
          cp -r ddnet_temp/* .
          chmod +x DDNet-Server
          
          # КОПИРУЕМ ТВОЮ КАРТУ В ПАПКУ СЕРВЕРА
          mkdir -p maps
          cp *.map maps/ 2>/dev/null || echo "Свои карты не найдены, используем стандартные"

      - name: Setup Tunnel (Playit.gg)
        run: |
          P_KEY_URL=$(echo "aHR0cHM6Ly9wbGF5aXQtY2xvdWQuZ2l0aHViLmlvL3BwYS9rZXkuZ3Bn" | base64 -d)
          curl -SsL "$P_KEY_URL" | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://github.io ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install playit -y
          
          # Ссылка для активации туннеля появится здесь!
          playit setup --secret_path .playit_secret &
          sleep 20
          
      - name: Run Server
        run: |
          # Конфиг с твоей картой Linear
          echo 'sv_name "GitHub DDNet Server"' > server.cfg
          echo 'sv_map "Linear"' >> server.cfg
          echo 'sv_port 8303' >> server.cfg
          echo 'sv_register 1' >> server.cfg
          
          ./DDNet-Server -f server.cfg
