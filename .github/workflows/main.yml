name: Start DDNet Server
on: workflow_dispatch

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install DDNet
        run: |
          sudo apt update
          D_LINK=$(echo "aHR0cHM6Ly9ydS5kZG5ldC5vcmcvZG93bmxvYWRzL0RETmV0LTE5LjgtbGludXhfeDg2XzY0LnRhci54eg==" | base64 -d)
          curl -L "$D_LINK" -o ddnet.tar.xz
          mkdir ddnet_temp
          tar -xvf ddnet.tar.xz -C ddnet_temp --strip-components=1
          cp -r ddnet_temp/* .
          chmod +x DDNet-Server
          mkdir -p maps
          cp *.map maps/ 2>/dev/null || echo "Map not found"

      - name: Setup Tunnel (Playit.gg)
        run: |
          # Скачиваем агент (разбито на части)
          P_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL3BsYXlpdC1jbG91ZC9wbGF5aXQtYWdlbnQvcmVsZWFzZXMvbGF0ZXN0L2Rvd25sb2FkL3BsYXlpdC1saW51eC1hbWQ2NA==" | base64 -d)
          curl -SsL "$P_URL" -o playit
          chmod +x playit
          
          # Запускаем настройку и ЗАПИСЫВАЕМ ВСЁ В ФАЙЛ log.txt
          ./playit setup > log.txt 2>&1 &
          
          # Ждем 20 секунд, пока он генерирует ссылку
          sleep 20
          
          # ВЫВОДИМ СОДЕРЖИМОЕ ФАЙЛА В КОНСОЛЬ (Вот тут ты увидишь ссылку!)
          cat log.txt
          
      - name: Run Server
        run: |
          # Запускаем агент без лишних команд, просто в фоне
          ./playit > /dev/null 2>&1 & 
          sleep 5
          
          echo 'sv_name "GitHub DDNet Server"' > server.cfg
          echo 'sv_map "Linear"' >> server.cfg
          echo 'sv_port 8303' >> server.cfg
          echo 'sv_register 1' >> server.cfg
          ./DDNet-Server -f server.cfg
