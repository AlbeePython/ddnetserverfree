name: Start DDNet Server
on: workflow_dispatch

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install DDNet
        run: |
          sudo apt update
          # Расшифровка ссылки на DDNet
          D_LINK=$(echo "aHR0cHM6Ly9ydS5kZG5ldC5vcmcvZG93bmxvYWRzL0RETmV0LTE5LjgtbGludXhfeDg2XzY0LnRhci54eg==" | base64 -d)
          curl -L "$D_LINK" -o ddnet.tar.xz
          
          mkdir ddnet_temp
          tar -xvf ddnet.tar.xz -C ddnet_temp --strip-components=1
          cp -r ddnet_temp/* .
          chmod +x DDNet-Server

      - name: Setup Tunnel (Playit.gg)
        run: |
          # Расшифровка ссылок Playit (чтобы ИИ их не обрезал)
          P_KEY_URL=$(echo "aHR0cHM6Ly9wbGF5aXQtY2xvdWQuZ2l0aHViLmlvL3BwYS9rZXkuZ3Bn" | base64 -d)
          P_REPO_URL=$(echo "ZGViIFtzaWduZWQtYnkgL2V0Yy9hcHQvdHJ1c3RlZC5ncGQuZC9wbGF5aXQuZ3BnXSBodHRwczovL3BsYXlpdC1jbG91ZC5naXRodWIuaW8vcHBhL2RhdGEgLi8=" | base64 -d)
          
          curl -SsL "$P_KEY_URL" | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "$P_REPO_URL" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          
          sudo apt update && sudo apt install playit -y
          
          # Запуск настройки. Ссылка появится в логах через 20 секунд
          playit setup --secret_path .playit_secret &
          sleep 20
          
      - name: Run Server
        run: |
          ./DDNet-Server -f autoexec_server.cfg
